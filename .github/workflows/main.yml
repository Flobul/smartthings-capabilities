name: "Generate capabilities"
on:
  workflow_dispatch:
  schedule:
    - cron: '13 05 */7 * *'

jobs:
  build:
    name: "Generate capabilities, presentation, and translations"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout files"
        uses: actions/checkout@v3

      - name: "Setup smartthings-cli"
        run: |
          wget "https://github.com/SmartThingsCommunity/smartthings-cli/releases/download/%40smartthings%2Fcli%401.8.2/smartthings-linux-x64.tar.gz"
          tar -xvf smartthings-linux-x64.tar.gz

      - name: "Set up environment variables"
        run: |
          SMARTTHINGS_TOKEN=$(echo ${{ secrets.SMARTTHINGS_TOKENS }} | head -n 1)
          echo "SMARTTHINGS_TOKEN=$SMARTTHINGS_TOKEN" >> $GITHUB_ENV

      - name: "Download smartthings capabilities"
        run: ./smartthings capabilities -s -j --token "${{ env.SMARTTHINGS_TOKEN }}" -o capabilities.json

      - name: "Process capabilities"
        run: |
          mkdir -p json
          count=0

          process_capability() {
            local id=$1
            local version=$2
            echo "Processing $id version $version"
            ./smartthings capabilities $id -s -j --token "${{ env.SMARTTHINGS_TOKEN }}" -o json/$id.json || true
            ./smartthings capabilities:presentation $id $version -j --token "${{ env.SMARTTHINGS_TOKEN }}" -o json/${id}Presentation.json || true
            ./smartthings capabilities:translations $id $version fr -j --token "${{ env.SMARTTHINGS_TOKEN }}" -o json/$id.i18n.fr.json || true
            ./smartthings capabilities:translations $id $version en -j --token "${{ env.SMARTTHINGS_TOKEN }}" -o json/$id.i18n.en.json || true
          }

          jq -c '.[]' capabilities.json | while read capability; do
            id=$(echo $capability | jq -r '.id')
            version=$(echo $capability | jq -r '.version')
            process_capability $id $version
            count=$((count+1))
          done

          if [ -f extra_capabilities_fix.json ]; then
            jq -c '.[]' extra_capabilities_fix.json | while read capa; do
              id=$(echo $capa | jq -r '.id')
              version=$(echo $capa | jq -r '.version')
              process_capability $id $version
              count=$((count+1))
            done
          fi

      - name: "Generate README.md"
        run: |
          PRINT="## SmartThings Capabilities\n"
          PRINT+="#### Last Update: "$(date -I)"\n"
          PRINT+="#### Edited by Flobul for Jeedom solution\n\n"
          PRINT+="* [SmartThings Reference](https://smartthings.developer.samsung.com/docs/api-ref/capabilities.html)\n"
          PRINT+="* [SmartThings API](https://smartthings.developer.samsung.com/docs/api-ref/st-api.html#tag/capabilities)\n"
          PRINT+="* [SmartThings CLI](https://github.com/SmartThingsCommunity/smartthings-cli)\n"
          PRINT+="* [Create Personal Access Token](https://account.smartthings.com/tokens)\n"
          PRINT+="* [Plugin Documentation](https://flobul-domotique.fr/documentation-du-plugin-smartthings-pour-jeedom/)\n"
          PRINT+="* [Plugin Jeedom Market](https://market.jeedom.com/index.php?v=d&p=market_display&id=4099)\n\n\n"
          PRINT+="| Capability | Version | Status | Capability Presentation | Translation i18n |\n"
          PRINT+="| ---- | ---- | ---- | ---- | ---- |\n\n"

          for file in json/*.json; do
            if [[ $file == *i18n* || $file == *Presentation.json ]]; then
              continue
            fi

            json=$(cat "$file" | sed 's/\\//g')
            name=$(echo "$json" | jq -r '.name')
            id=$(echo "$json" | jq -r '.id')
            statuses=$(echo "$json" | jq -r '.status')
            versions=$(echo "$json" | jq -r '.version')

            presentation=""
            i18n=""
            [ -f "json/${id}Presentation.json" ] && presentation="[json](./json/${id}Presentation.json)"
            [ -f "json/${id}.i18n.fr.json" ] && i18n="[json](./json/${id}.i18n.fr.json)"

            PRINT+="| [$name](./json/$id.json) | $versions | $statuses | $presentation | $i18n |\n"
          done

          echo -e "$PRINT" > README.md

      - name: "Create pull requests"
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "flobul.jeedom@gmail.com"

          # Save all changed files to /tmp before any git branch operations so that
          # subsequent git checkouts do not discard the API-downloaded content.
          mkdir -p /tmp/changed_caps /tmp/changed_trans

          cap_files=()
          trans_files=()

          # git status --porcelain format: "XY path" (2-char status + space + path, minimum 4 chars)
          while IFS= read -r line; do
            [[ ${#line} -lt 4 ]] && continue
            file="${line:3}"  # skip the "XY " prefix
            [[ -f "$file" ]] || continue
            if [[ "$file" == json/*.json ]]; then
              if [[ "$file" == *".i18n."* ]] || [[ "$file" == *"Presentation.json" ]]; then
                cp "$file" "/tmp/changed_trans/$(basename "$file")"
                trans_files+=("$file")
              else
                cp "$file" "/tmp/changed_caps/$(basename "$file")"
                cap_files+=("$file")
              fi
            fi
          done < <(git status --porcelain)

          # Check README changes before any branch switching
          readme_changed=false
          if ! git diff --quiet HEAD -- README.md 2>/dev/null; then
            cp README.md /tmp/README.md
            readme_changed=true
          fi

          echo "Capability files to process: ${#cap_files[@]}"
          echo "Translation/presentation files: ${#trans_files[@]}"
          echo "README changed: $readme_changed"

          # --- One PR per capability file ---
          for file in "${cap_files[@]}"; do
            basename_file=$(basename "$file")
            branch_name="update-$basename_file"
            pr_number=""

            # Skip files where an open PR already carries the 'wontfix' label
            # Query the GitHub API; tolerate "no PR" (empty list) without hiding auth/network failures
            pr_info=$(gh pr list --state open --head "$branch_name" --json number,labels | jq -c '.[0] // empty' 2>/dev/null || true)
            if [ -n "$pr_info" ]; then
              has_wontfix=$(echo "$pr_info" | jq -r '[.labels[] | select(.name == "wontfix")] | length > 0')
              if [ "$has_wontfix" = "true" ]; then
                echo "Skipping $file — open PR has 'wontfix' label"
                continue
              fi
              pr_number=$(echo "$pr_info" | jq -r '.number')
            fi

            # Create a fresh branch from master — guarantees exactly one file changes per PR
            git checkout -B "$branch_name" master

            # Apply only this file's content from the API download
            cp "/tmp/changed_caps/$basename_file" "$file"
            git add "$file"

            if git diff --cached --quiet; then
              echo "No difference vs master for $file, skipping"
              git checkout master
              continue
            fi

            git commit -m "Update $file"
            diff_output=$(git diff HEAD~1 -- "$file")
            git push origin "$branch_name" --force

            if [ -n "$pr_number" ]; then
              body=$(printf 'Updated changes for %s\n\n```diff\n%s\n```' "$file" "$diff_output")
              gh pr edit "$pr_number" --body "$body" || true
              echo "Updated existing PR #$pr_number for $file"
            else
              body=$(printf 'Automated update for %s\n\n```diff\n%s\n```' "$file" "$diff_output")
              gh pr create \
                --title "Update $file" \
                --body "$body" \
                --base master \
                --head "$branch_name" || echo "Warning: could not create PR for $file"
              echo "Created new PR for $file"
            fi

            git checkout master
          done

          # --- Group PR for translations and presentations ---
          if [ ${#trans_files[@]} -gt 0 ]; then
            branch_name="update-translations-and-presentations"
            pr_number=$(gh pr list --state open --head "$branch_name" --json number -q '.[0].number' 2>/dev/null || echo "")

            git checkout -B "$branch_name" master

            for file in "${trans_files[@]}"; do
              cp "/tmp/changed_trans/$(basename "$file")" "$file"
            done

            git add json/*.i18n.*.json json/*Presentation.json

            if ! git diff --cached --quiet; then
              git commit -m "Update translations and presentations"
              git push origin "$branch_name" --force

              if [ -n "$pr_number" ]; then
                gh pr edit "$pr_number" --body "Automated update for translation and presentation files." || true
                echo "Updated translations PR #$pr_number"
              else
                gh pr create \
                  --title "Update translations and presentations" \
                  --body "Automated update for translation and presentation files." \
                  --base master \
                  --head "$branch_name" || echo "Warning: could not create translations PR"
                echo "Created translations PR"
              fi
            else
              echo "No changes for translations/presentations"
            fi

            git checkout master
          fi

          # --- Separate PR for README ---
          if [ "$readme_changed" = true ]; then
            branch_name="update-readme"
            pr_number=$(gh pr list --state open --head "$branch_name" --json number -q '.[0].number' 2>/dev/null || echo "")

            git checkout -B "$branch_name" master
            cp /tmp/README.md README.md
            git add README.md

            if ! git diff --cached --quiet; then
              git commit -m "Update README.md"
              git push origin "$branch_name" --force

              if [ -n "$pr_number" ]; then
                echo "Updated README PR #$pr_number"
              else
                gh pr create \
                  --title "Update README.md" \
                  --body "Automated update for README.md" \
                  --base master \
                  --head "$branch_name" || echo "Warning: could not create README PR"
                echo "Created README PR"
              fi
            else
              echo "No changes for README.md"
            fi

            git checkout master
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
